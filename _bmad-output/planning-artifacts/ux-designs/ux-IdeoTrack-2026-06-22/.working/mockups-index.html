<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>思政打卡 App - 关键界面原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#f3f4f6;padding:40px;}.mockup-card{background:white;border-radius:24px;padding:24px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);}iframe{width:375px;height:812px;border:none;border-radius:40px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);}</style>
</head>
<body>
  <h1 class="text-3xl font-bold text-center text-gray-800 mb-2">思政打卡 App 关键界面原型</h1>
  <p class="text-center text-gray-500 mb-10">基于「清新教育风」视觉方案的高保真 HTML 原型</p>
  <div class="flex flex-wrap justify-center gap-8">
    <div class="mockup-card flex flex-col items-center"><h2 class="text-lg font-bold text-cyan-700 mb-2">学生首页</h2><p class="text-sm text-gray-500 mb-4">每日名言 + 任务 + 连续打卡</p><iframe src="mockup-student-home.html"></iframe></div>
    <div class="mockup-card flex flex-col items-center"><h2 class="text-lg font-bold text-cyan-700 mb-2">任务详情</h2><p class="text-sm text-gray-500 mb-4">阅读任务 + 定位签到 + 心得输入</p><iframe src="mockup-task-detail.html"></iframe></div>
    <div class="mockup-card flex flex-col items-center"><h2 class="text-lg font-bold text-cyan-700 mb-2">打卡成功</h2><p class="text-sm text-gray-500 mb-4">积分 + 连续天数 + 勋章反馈</p><iframe src="mockup-success.html"></iframe></div>
    <div class="mockup-card flex flex-col items-center"><h2 class="text-lg font-bold text-cyan-700 mb-2">打卡日历</h2><p class="text-sm text-gray-500 mb-4">历史打卡记录与心得回顾</p><iframe src="mockup-calendar.html"></iframe></div>
    <div class="mockup-card flex flex-col items-center"><h2 class="text-lg font-bold text-cyan-700 mb-2">辅导员看板</h2><p class="text-sm text-gray-500 mb-4">班级数据 + 重点关注</p><iframe src="mockup-counselor.html"></iframe></div>
  </div>
</body>
</html>
