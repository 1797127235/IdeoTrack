<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>打卡成功</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans SC',sans-serif;background:#f3f4f6;}.phone{width:375px;height:812px;margin:20px auto;background:#ECFEFF;border-radius:40px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);}</style>
</head>
<body>
  <div class="phone flex flex-col items-center justify-center px-8 text-center">
    <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center text-white text-5xl mb-6 shadow-lg shadow-green-200">✓</div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">今日打卡完成！</h1>
    <p class="text-gray-500 text-sm mb-8">连续打卡 5 天，继续加油～</p>
    <div class="bg-white rounded-2xl p-6 w-full shadow-sm mb-6">
      <div class="flex justify-around">
        <div class="text-center"><p class="text-2xl font-bold text-cyan-700">+10</p><p class="text-xs text-gray-500">积分</p></div>
        <div class="text-center"><p class="text-2xl font-bold text-cyan-700">5</p><p class="text-xs text-gray-500">连续天</p></div>
        <div class="text-center"><p class="text-2xl font-bold text-cyan-700">256</p><p class="text-xs text-gray-500">总积分</p></div>
      </div>
    </div>
    <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4 w-full mb-8 flex items-center gap-3">
      <span class="text-3xl">🏅</span>
      <div class="text-left"><p class="text-sm font-bold text-yellow-800">获得勋章：坚持一周</p><p class="text-xs text-yellow-600">已连续打卡 7 天</p></div>
    </div>
    <button class="w-full bg-cyan-600 text-white font-bold py-4 rounded-2xl mb-3">返回首页</button>
    <button class="w-full bg-white text-cyan-700 font-medium py-4 rounded-2xl border border-cyan-200">查看打卡日历</button>
  </div>
</body>
</html>
