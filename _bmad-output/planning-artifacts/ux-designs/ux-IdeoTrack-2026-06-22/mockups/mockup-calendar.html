<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=375, initial-scale=1.0">
  <title>打卡日历</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans SC',sans-serif;background:#f3f4f6;}.phone{width:375px;height:812px;margin:20px auto;background:#ECFEFF;border-radius:40px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);}</style>
</head>
<body>
  <div class="phone flex flex-col">
    <div class="bg-gradient-to-r from-cyan-600 to-cyan-500 pt-12 pb-6 px-5 rounded-b-[32px] shadow-lg">
      <h1 class="text-xl font-bold text-white">打卡日历</h1>
      <p class="text-cyan-100 text-sm mt-1">2026 年 6 月 · 连续打卡 5 天</p>
    </div>
    <div class="flex-1 px-5 py-5 overflow-y-auto">
      <div class="bg-white rounded-2xl p-5 shadow-sm mb-4">
        <div class="grid grid-cols-7 gap-2 text-center mb-3">
          <span class="text-xs text-gray-400">日</span><span class="text-xs text-gray-400">一</span><span class="text-xs text-gray-400">二</span><span class="text-xs text-gray-400">三</span><span class="text-xs text-gray-400">四</span><span class="text-xs text-gray-400">五</span><span class="text-xs text-gray-400">六</span>
        </div>
        <div class="grid grid-cols-7 gap-2 text-center">
          <span class="h-10"></span><span class="h-10"></span><span class="h-10"></span><span class="h-10"></span><span class="h-10"></span><span class="h-10"></span><span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">1</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">2</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">3</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">4</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">5</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">6</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">7</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">8</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">9</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">10</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm">11</span>
          <span class="h-10 rounded-lg bg-green-500 text-white flex items-center justify-center text-sm border-2 border-cyan-500">12</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">13</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">14</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">15</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">16</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">17</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">18</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">19</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">20</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">21</span>
          <span class="h-10 rounded-lg bg-gray-200 text-gray-400 flex items-center justify-center text-sm">22</span>
        </div>
      </div>
      <div class="bg-white rounded-2xl p-5 shadow-sm">
        <h3 class="text-base font-bold text-gray-800 mb-3">6 月 12 日心得</h3>
        <p class="text-sm text-gray-600 leading-relaxed">通过学习新时代青年使命担当，我认识到个人理想只有融入国家发展大局，才能真正实现价值。作为大学生，我们要在专业学习中锤炼本领，在社会实践中增长才干。</p>
      </div>
    </div>
    <div class="bg-white px-6 py-4 flex justify-between items-center text-xs border-t border-gray-100">
      <div class="flex flex-col items-center text-gray-400"><span class="text-xl mb-1">🏠</span><span>首页</span></div>
      <div class="flex flex-col items-center text-cyan-600"><span class="text-xl mb-1">📅</span><span>日历</span></div>
      <div class="flex flex-col items-center text-gray-400"><span class="text-xl mb-1">🏆</span><span>排行</span></div>
      <div class="flex flex-col items-center text-gray-400"><span class="text-xl mb-1">👤</span><span>我的</span></div>
    </div>
  </div>
</body>
</html>
