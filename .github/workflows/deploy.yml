name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ideo_track_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Run migrations
        working-directory: api
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test

      - name: Run seed
        working-directory: api
        run: npm run db:seed
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test

      - name: Build
        working-directory: api
        run: npm run build

      - name: Run tests
        working-directory: api
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          TEST_DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          JWT_SECRET: test-jwt-secret-key-for-ci-testing-min-32-chars
          JWT_EXPIRES_IN: 7d

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/IdeoTrack

            # 拉取最新代码
            git pull origin main

            # 生成 /opt/IdeoTrack/.env（仅服务器本地，不进 git）
            # 所有敏感配置来自 GitHub Secrets，compose 会自动读取这个文件
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            WECHAT_APP_ID=${{ secrets.WECHAT_APP_ID }}
            WECHAT_APP_SECRET=${{ secrets.WECHAT_APP_SECRET }}
            CLIENT_URL=*
            EOF
            chmod 600 .env

            # 配置 API 域名，Caddy 会自动申请并续期 HTTPS 证书
            cat > Caddyfile << 'EOF'
            ideotrack.cc.cd {
              reverse_proxy api:3000
            }
            EOF

            # 首次切换数据库密码时，旧卷（用默认密码初始化）会导致 postgres 起不来。
            # 用标记文件保证只删一次：之后再部署永远走 up -d，不会丢数据。
            if [ ! -f .db-password-set ]; then
              echo "First deploy with managed password — resetting postgres volume..."
              docker compose --profile with-caddy down -v --remove-orphans
              touch .db-password-set
            fi

            # 重新构建并启动
            docker compose --profile with-caddy up -d --build
            docker compose restart caddy

            # 等待 API 服务就绪
            sleep 10

            # 执行数据库迁移（生产镜像只包含 dist 和生产依赖）
            docker compose exec -T api node dist/scripts/migrate.js

            # 检查服务状态
            docker compose ps

            echo "Deploy completed successfully!"
