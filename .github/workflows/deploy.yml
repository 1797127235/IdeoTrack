name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ideotrack

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ideo_track_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Run migrations
        working-directory: api
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test

      # 注：不在此处 db:seed。每个测试文件都自建所需数据（带 TEST 前缀并在 setup 中清理），
      # 全局 seed 只会注入无人使用的账号/名言/任务，留下噪音数据，且会让测试隐式依赖 seed 逻辑。
      # 如需在生产灌初始数据，用手动 workflow "Seed Database"。

      - name: Build
        working-directory: api
        run: npm run build

      - name: Run tests
        working-directory: api
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          TEST_DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          JWT_SECRET: test-jwt-secret-key-for-ci-testing-min-32-chars
          JWT_EXPIRES_IN: 7d
          WECHAT_APP_ID: test-wechat-app-id
          WECHAT_APP_SECRET: test-wechat-app-secret
          WECHAT_REMINDER_TEMPLATE_ID: test-reminder-template-id

  build:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_tag=${{ env.IMAGE_PREFIX }}-api:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "web_tag=${{ env.IMAGE_PREFIX }}-web:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "face_tag=${{ env.IMAGE_PREFIX }}-face:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "api_latest=${{ env.IMAGE_PREFIX }}-api:latest" >> "$GITHUB_OUTPUT"
          echo "web_latest=${{ env.IMAGE_PREFIX }}-web:latest" >> "$GITHUB_OUTPUT"
          echo "face_latest=${{ env.IMAGE_PREFIX }}-face:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.api_tag }},${{ steps.meta.outputs.api_latest }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.web_tag }},${{ steps.meta.outputs.web_latest }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=https://ideotrack.cc.cd/api
            NEXT_PUBLIC_AMAP_JSAPI_KEY=${{ secrets.NEXT_PUBLIC_AMAP_JSAPI_KEY }}

      - name: Build and push Face image
        uses: docker/build-push-action@v6
        with:
          context: ./face-service
          push: true
          tags: ${{ steps.meta.outputs.face_tag }},${{ steps.meta.outputs.face_latest }}
          cache-from: type=gha,scope=face
          cache-to: type=gha,mode=max,scope=face

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            cd /opt/IdeoTrack

            # 确保服务器工作区干净，并强制对齐到 origin/main
            git fetch origin main
            git reset --hard origin/main
            git pull origin main

            # 生成 /opt/IdeoTrack/.env（仅服务器本地，不进 git）
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            WECHAT_APP_ID=${{ secrets.WECHAT_APP_ID }}
            WECHAT_APP_SECRET=${{ secrets.WECHAT_APP_SECRET }}
            WECHAT_REMINDER_TEMPLATE_ID=${{ secrets.WECHAT_REMINDER_TEMPLATE_ID }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}
            DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
            CLIENT_URL=*
            NEXT_PUBLIC_API_URL=https://ideotrack.cc.cd/api
            NEXT_PUBLIC_AMAP_JSAPI_KEY=${{ secrets.NEXT_PUBLIC_AMAP_JSAPI_KEY }}
            IMAGE_TAG=${{ steps.meta.outputs.sha }}
            EOF
            chmod 600 .env

            # 首次切换数据库密码时，旧卷（用默认密码初始化）会导致 postgres 起不来。
            # 用标记文件保证只删一次：之后再部署永远走 up -d，不会丢数据。
            if [ ! -f .db-password-set ]; then
              echo "First deploy with managed password — backing up then resetting postgres volume..."
              docker compose exec -T postgres pg_dump -U postgres -d ideo_track \
                > "/opt/IdeoTrack/db-backup-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || \
                echo "WARN: pg_dump skipped (container not up or default creds differ)"
              docker compose --profile with-caddy down -v --remove-orphans
              touch .db-password-set
            fi

            # 登录 GitHub Container Registry 并拉取最新镜像
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 部署前清理旧容器，避免容器名冲突
            docker compose --profile with-caddy down --remove-orphans || true
            docker rm -f ideo-track-api ideo-track-web ideo-track-postgres ideo-track-face ideo-track-caddy 2>/dev/null || true

            # 只拉取/启动，不再 --build
            docker compose --profile with-caddy pull
            docker compose --profile with-caddy up -d --remove-orphans

            # 等待 API 健康（最多 60 秒）
            echo "Waiting for API health..."
            for i in {1..30}; do
              if docker compose exec -T api wget -qO- http://localhost:3000/health >/dev/null 2>&1; then
                echo "API is healthy"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "ERROR: API did not become healthy within 60s"
                docker compose ps
                docker compose logs --tail=50 api
                exit 1
              fi
              sleep 2
            done

            # 执行数据库迁移
            docker compose exec -T api node dist/scripts/migrate.js

            # 等待 Web 就绪（检查静态资源端口）
            echo "Waiting for Web..."
            for i in {1..60}; do
              if docker compose exec -T web wget -qO- http://localhost:3001/admin/login >/dev/null 2>&1 || \
                 docker compose exec -T web wget -qO- http://localhost:3001/admin >/dev/null 2>&1; then
                echo "Web is ready"
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "ERROR: Web did not become ready within 120s"
                docker compose ps
                docker compose logs --tail=80 web
                exit 1
              fi
              sleep 2
            done

            # 检查服务状态
            docker compose ps

            echo "Deploy completed successfully!"
