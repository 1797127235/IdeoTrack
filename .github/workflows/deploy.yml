name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ideo_track_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm install

      - name: Run migrations
        working-directory: api
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test

      # 注：不在此处 db:seed。每个测试文件都自建所需数据（带 TEST 前缀并在 setup 中清理），
      # 全局 seed 只会注入无人使用的账号/名言/任务，留下噪音数据，且会让测试隐式依赖 seed 逻辑。
      # 如需在生产灌初始数据，用手动 workflow "Seed Database"。

      - name: Build
        working-directory: api
        run: npm run build

      - name: Run tests
        working-directory: api
        run: npm test
        env:
          DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          TEST_DATABASE_URL: postgres://postgres:testpassword@localhost:5432/ideo_track_test
          JWT_SECRET: test-jwt-secret-key-for-ci-testing-min-32-chars
          JWT_EXPIRES_IN: 7d
          WECHAT_APP_ID: test-wechat-app-id
          WECHAT_APP_SECRET: test-wechat-app-secret
          WECHAT_REMINDER_TEMPLATE_ID: test-reminder-template-id

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            cd /opt/IdeoTrack

            # 确保服务器工作区干净，避免本地未提交修改阻塞 git pull
            # 注意：这会丢弃对仓库跟踪文件的本地修改；后续会重新生成 .env
            git reset --hard HEAD

            # 拉取最新代码
            git pull origin main

            # 生成 /opt/IdeoTrack/.env（仅服务器本地，不进 git）
            # 所有敏感配置来自 GitHub Secrets，compose 会自动读取这个文件
            cat > .env << EOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            DATABASE_URL=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=7d
            WECHAT_APP_ID=${{ secrets.WECHAT_APP_ID }}
            WECHAT_APP_SECRET=${{ secrets.WECHAT_APP_SECRET }}
            WECHAT_REMINDER_TEMPLATE_ID=${{ secrets.WECHAT_REMINDER_TEMPLATE_ID }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}
            DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
            CLIENT_URL=*
            NEXT_PUBLIC_API_URL=https://ideotrack.cc.cd/api
            NEXT_PUBLIC_AMAP_KEY=${{ secrets.NEXT_PUBLIC_AMAP_KEY }}
            EOF
            chmod 600 .env

            # Caddyfile 现在由仓库管理（git pull 拉取），不再在此动态生成。
            # 主域名 ideotrack.cc.cd 同时承载 API（其余路径）和管理后台（/admin*），
            # 管理后台挂在路径下，避免为 admin 子域名单独配 DNS（见仓库 Caddyfile）。

            # 首次切换数据库密码时，旧卷（用默认密码初始化）会导致 postgres 起不来。
            # 用标记文件保证只删一次：之后再部署永远走 up -d，不会丢数据。
            # 保险：即便标记文件意外丢失触发 down -v，也先 pg_dump 出一份完整备份，避免无声丢库。
            # 此处容器仍跑着旧密码初始化的卷，所以用默认账号导出（失败则跳过，不阻断部署）。
            if [ ! -f .db-password-set ]; then
              echo "First deploy with managed password — backing up then resetting postgres volume..."
              docker compose exec -T postgres pg_dump -U postgres -d ideo_track \
                > "/opt/IdeoTrack/db-backup-$(date +%Y%m%d-%H%M%S).sql" 2>/dev/null || \
                echo "WARN: pg_dump skipped (container not up or default creds differ)"
              docker compose --profile with-caddy down -v --remove-orphans
              touch .db-password-set
            fi

            # 重新构建并启动
            docker compose --profile with-caddy up -d --build
            docker compose restart caddy

            # 等待 Web 服务就绪
            sleep 10

            # 等待 API 服务就绪
            sleep 10

            # 执行数据库迁移（生产镜像只包含 dist 和生产依赖）
            docker compose exec -T api node dist/scripts/migrate.js

            # 检查服务状态
            docker compose ps

            echo "Deploy completed successfully!"
