services:
  postgres:
    image: postgres:17-alpine
    container_name: ideo-track-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-ideo_track}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ideo_track}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-ghcr.io/1797127235/ideotrack-api:${IMAGE_TAG:-latest}}
    container_name: ideo-track-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-*}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-ideo_track}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_REMINDER_TEMPLATE_ID: ${WECHAT_REMINDER_TEMPLATE_ID:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      EXPORT_FILE_DIR: ${EXPORT_FILE_DIR:-/app/exports}
      EXPORT_LINK_TTL_SECONDS: ${EXPORT_LINK_TTL_SECONDS:-86400}
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face:8000}
      FACE_PHOTO_DIR: ${FACE_PHOTO_DIR:-/app/faces}
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./faces:/app/faces
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ${WEB_IMAGE:-ghcr.io/1797127235/ideotrack-web:${IMAGE_TAG:-latest}}
    container_name: ideo-track-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3001
      API_BASE_URL: http://api:3000/api
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  face:
    image: ${FACE_IMAGE:-ghcr.io/1797127235/ideotrack-face:${IMAGE_TAG:-latest}}
    container_name: ideo-track-face
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./face-service/models:/app/models
      - face_cache:/root/.insightface
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: ideo-track-caddy
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    profiles:
      - with-caddy

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  face_cache:
